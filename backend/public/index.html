<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agendamento de Descarga V3</title>
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="header-main">
      <div class="brand-block">
        <div class="brand-text">
          <h1>Agendamento de Descarga</h1>
          <small>V3 operacional • sem 2FA • RBAC • fila • docas • auditoria</small>
        </div>
        <div class="brand-logo">
          <img src="/assets/logo-objetiva.png" alt="Logo Objetiva" class="logo" />
        </div>
      </div>

      <div class="nav-block">
        <nav id="publicNav" class="nav-menu">
          <button data-view="public-home">Início</button>
          <button data-view="fornecedor">Fornecedor/Transportadora</button>
          <button data-view="motorista">Motorista</button>
          <button data-view="checkin">Check-in QR</button>
          <button data-view="login">Área do Colaborador</button>
        </nav>

        <nav id="privateNav" class="nav-menu hidden">
          <button data-view="dashboard">Dashboard</button>
          <button data-view="docas">Painel de Docas</button>
          <button data-view="cadastros">Cadastros</button>
          <button data-view="agendamentos">Agendamentos</button>
          <button id="btnLogout">Sair</button>
        </nav>
      </div>
    </div>
  </header>
</body>
</html>
