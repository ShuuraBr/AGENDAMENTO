<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agendamento de Descarga</title>
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body>
  <header class="topbar">
    <h1>Agendamento de Descarga</h1>
    <nav>
      <button data-view="login">Login</button>
      <button data-view="dashboard">Dashboard</button>
      <button data-view="agendamentos">Agendamentos</button>
      <button data-view="publico">Público</button>
    </nav>
  </header>

  <main class="container">
    <section id="login" class="view active">
      <div class="card">
        <h2>Login</h2>
        <form id="loginForm">
          <label>Email<input name="email" value="admin@local.test" /></label>
          <label>Senha<input name="senha" type="password" value="123456" /></label>
          <button type="submit">Entrar</button>
        </form>
        <p id="loginMsg" class="msg"></p>
      </div>
    </section>

    <section id="dashboard" class="view">
      <div class="card">
        <h2>Painel Operacional</h2>
        <button id="loadDashboard">Atualizar dashboard</button>
        <div id="kpis" class="grid"></div>
      </div>
    </section>

    <section id="agendamentos" class="view">
      <div class="grid2">
        <div class="card">
          <h2>Novo Agendamento</h2>
          <form id="agendamentoForm">
            <label>Fornecedor<input name="fornecedor" value="Fornecedor Exemplo LTDA" /></label>
            <label>Transportadora<input name="transportadora" value="Transportadora Exemplo" /></label>
            <label>Motorista<input name="motorista" value="Motorista Exemplo" /></label>
            <label>Placa<input name="placa" value="ABC1D23" /></label>
            <label>Data<input name="dataAgendada" type="date" /></label>
            <label>Hora<input name="horaAgendada" value="08:00" /></label>
            <label>Notas<input name="quantidadeNotas" type="number" value="1" /></label>
            <label>Volumes<input name="quantidadeVolumes" type="number" value="10" /></label>
            <label>Observações<textarea name="observacoes"></textarea></label>
            <button type="submit">Salvar</button>
          </form>
          <p id="agendamentoMsg" class="msg"></p>
        </div>
        <div class="card">
          <h2>Lista</h2>
          <button id="loadAgendamentos">Atualizar lista</button>
          <div id="agendamentosList"></div>
        </div>
      </div>
    </section>

    <section id="publico" class="view">
      <div class="grid2">
        <div class="card">
          <h2>Solicitação Pública</h2>
          <form id="publicForm">
            <label>Fornecedor<input name="fornecedor" value="Fornecedor Externo" /></label>
            <label>Transportadora<input name="transportadora" value="Transportadora Externa" /></label>
            <label>Motorista<input name="motorista" value="Motorista Externo" /></label>
            <label>Placa<input name="placa" value="DEF4G56" /></label>
            <label>Data<input name="dataAgendada" type="date" /></label>
            <label>Hora<input name="horaAgendada" value="09:00" /></label>
            <button type="submit">Enviar</button>
          </form>
          <p id="publicMsg" class="msg"></p>
        </div>
        <div class="card">
          <h2>Consulta por Protocolo</h2>
          <form id="consultaForm">
            <label>Protocolo<input name="protocolo" placeholder="AGD-..." /></label>
            <button type="submit">Consultar</button>
          </form>
          <pre id="consultaResult"></pre>
        </div>
      </div>
    </section>
  </main>

  <script src="/assets/app.js"></script>
</body>
</html>
