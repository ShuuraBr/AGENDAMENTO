name: ci

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - app: backend
            dir: "."
    defaults:
      run:
        working-directory: ${{ matrix.dir }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --retry 3
      - run: npm run build || echo "No build script for this package"
